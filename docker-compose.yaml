services:
  web:
    build: .
    image: docrunner:latest
    restart: unless-stopped
    expose:
      - "8000"
    environment:
      SECRET_KEY: "${SECRET_KEY}"
      ENCRYPTION_KEY: "${ENCRYPTION_KEY}"
      DEBUG: "${DEBUG:-False}"
      ALLOWED_HOSTS: "${ALLOWED_HOSTS:-localhost}"
      CSRF_TRUSTED_ORIGINS: "${CSRF_TRUSTED_ORIGINS:-}"
      DATA_DIR: "/app/data"
      TIME_ZONE: "${TIME_ZONE:-UTC}"
      Q_WORKERS: "${Q_WORKERS:-2}"
      WEB_WORKERS: "${WEB_WORKERS:-3}"
    volumes:
      - docrunner_data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/accounts/login/"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

volumes:
  docrunner_data:

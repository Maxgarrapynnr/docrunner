services:
  web:
    build: .
    image: docrunner:latest
    restart: unless-stopped
    expose:
      - "8000"
    environment:
      - SECRET_KEY=${SECRET_KEY}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - DEBUG=${DEBUG:-False}
      - ALLOWED_HOSTS=${ALLOWED_HOSTS:-localhost}
      - CSRF_TRUSTED_ORIGINS=${CSRF_TRUSTED_ORIGINS:-}
      - TIME_ZONE=${TIME_ZONE:-UTC}
      - Q_WORKERS=${Q_WORKERS:-2}
      - WEB_WORKERS=${WEB_WORKERS:-3}
      - DATA_DIR=/app/data
    volumes:
      - docrunner_data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/accounts/login/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s

volumes:
  docrunner_data:
